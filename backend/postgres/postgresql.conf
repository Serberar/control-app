# ============================================================
# PostgreSQL — Configuración de producción con WAL habilitado
# Control Parental App
# ============================================================

# --- Conexiones ---
max_connections = 100

# --- Memoria ---
shared_buffers = 256MB
effective_cache_size = 768MB
maintenance_work_mem = 64MB
work_mem = 4MB

# --- WAL (Write-Ahead Log) ---
wal_level = replica              # Habilita WAL completo (replica > minimal)
synchronous_commit = on          # Garantiza que el commit no se pierde
wal_buffers = 16MB
wal_compression = on             # Comprime WAL para ahorrar espacio
max_wal_size = 1GB
min_wal_size = 80MB
checkpoint_completion_target = 0.9
checkpoint_warning = 30s

# --- Archivado WAL ---
archive_mode = on
archive_command = 'test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f'
archive_timeout = 300            # Fuerza archivado cada 5 min aunque no haya actividad

# --- Replicación (preparado para futura réplica) ---
max_wal_senders = 3
wal_keep_size = 256              # MB de WAL a retener

# --- Rendimiento ---
random_page_cost = 1.1           # Para discos SSD
effective_io_concurrency = 200   # Para discos SSD
default_statistics_target = 100

# --- Logging ---
log_min_duration_statement = 1000   # Loguea queries > 1 segundo
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_temp_files = 0

# --- Autovacuum ---
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
