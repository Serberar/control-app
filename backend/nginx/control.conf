upstream control_api {
  server control-api:3000;
  keepalive 32;
}

server {
  listen 80;
  server_name control.tudominio.com;

  # Redirige todo a HTTPS
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name control.tudominio.com;

  # SSL — Let's Encrypt (ajusta las rutas a las tuyas)
  ssl_certificate     /etc/letsencrypt/live/control.tudominio.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/control.tudominio.com/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_session_cache   shared:SSL:10m;

  # Seguridad
  add_header X-Frame-Options DENY;
  add_header X-Content-Type-Options nosniff;
  add_header X-XSS-Protection "1; mode=block";

  # Tamaño máximo de subida (fotos/vídeos)
  client_max_body_size 50M;

  # API REST
  location /api/ {
    proxy_pass         http://control_api;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Connection        "";
    proxy_read_timeout 30s;
  }

  # Health check
  location /health {
    proxy_pass         http://control_api;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
  }

  # WebSocket — Socket.io necesita upgrade
  location /socket.io/ {
    proxy_pass         http://control_api;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host       $host;
    proxy_set_header   X-Real-IP  $remote_addr;
    proxy_read_timeout 3600s;   # 1 hora — conexiones WS largas
    proxy_send_timeout 3600s;
  }
}
